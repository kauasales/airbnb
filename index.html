<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airbnb - Salem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>

    <!-- ===== BACKGROUND ===== -->
    <div class="bg-container" id="bgContainer"></div>
    <div class="bg-overlay"></div>

    <!-- ===== HEADER ===== -->
    <header>
        <div class="header-container">
            <div class="header-left">
                <h1 id="headerTitle">Airbnb do Salem</h1>
            </div>
            <button onclick="toggleLanguage()" id="langToggle">
                <i class="fa-solid fa-globe"></i> <span id="langLabel">EN</span>
            </button>
        </div>
    </header>

    <!-- ===== MENU PRINCIPAL ===== -->
    <div class="tabs-nav" id="tabsNav"></div>

    <!-- ===== CONTEÚDO ===== -->
    <div class="content-container" id="contentContainer"></div>

    <!-- ===== FOOTER HINT ===== -->
    <div class="footer-hint">
        <i class="fa-solid fa-angles-left"></i> <span id="footerHint">Deslize para navegar</span> <i class="fa-solid fa-angles-right"></i>
    </div>

    <script src="src/js/data.js"></script>
    <script src="src/js/translations.js"></script>
    <script src="src/js/script.js"></script>
</body>
</html>
